<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भाडे पावती</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f5f5dc;
            margin: 20px;
            padding: 20px;
            border: 2px solid #8b4513;
            max-width: 600px;
            margin: auto;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            color: #8b4513;
            text-decoration: underline;
        }
        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .receipt-header p {
            margin: 5px 0;
            font-size: 18px;
            color: #000;
        }
        .receipt-details {
            margin-bottom: 20px;
        }
        .receipt-details p {
            margin: 10px 0;
            font-size: 16px;
        }
        .blank-line {
            border-bottom: 1px solid #000;
            margin: 10px 0;
            display: inline-block;
            width: 100%;
        }
        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .signature-section p {
            margin: 5px 0;
            font-size: 16px;
        }
        .signature-line {
            border-bottom: 1px solid #000;
            width: 200px;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #8b4513;
        }
    </style>
</head>
<body>

        <h1>सुरवसे हाऊस</h1>
         <div class="receipt-header"> 
            <p>सावे वाडी, लातूर</p> 
        <p>मोबाईल: ८३५६९६८४१५</p>
        <div class="blank-line"></div>
    </div>
    <div class="receipt-details">
        <p><strong>भाडेकरूचे नाव:</strong> <span class="blank-line"></span></p>
        <p><strong>कायमचा पत्ता:</strong> <span class="blank-line"></span></p>
        <p><strong>व्यवसाय:</strong> <span class="blank-line"></span></p>
        <p><strong>कॉलेजचे नाव:</strong> <span class="blank-line"></span></p>
        <p><strong>आणीबाणी संपर्क क्रमांक:</strong> <span class="blank-line"></span></p>
        <p><strong>डेपॉझिट रक्कम:</strong> <span class="blank-line"></span></p>
        <p><strong>भाड्याची प्राप्त रक्कम:</strong> <span class="blank-line"></span></p>
        <p><strong>दिनांक:</strong> <span class="blank-line"></span></p>
    </div>
    <div class="signature-section">
        <div>
            <p><strong>भाडेकरूची सही:</strong></p>
            <div class="signature-line"></div>
        </div>
        <div>
            <p><strong>मकान मालकाची सही:</strong></p>
            <div class="signature-line"></div>
        </div>
    </div>
    <div class="footer">
        <p>ही पावती भाडेकरूच्या वापरासाठी आहे.</p>
    </div>
</body>
</html>
